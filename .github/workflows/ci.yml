name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install pdm
        run: pipx install pdm

      - name: Install dependencies
        run: pdm install

      - name: Run make lint
        run: make lint

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install pdm
        run: pipx install pdm

      - name: Install dependencies
        run: pdm install

      - name: Run make test
        run: make test

  architecture:
    name: architecture
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install pdm
        run: pipx install pdm

      - name: Install dependencies
        run: pdm install

      - name: Run architecture fitness tests
        # Phase 8: AR-003 (no agent SQL), NFR-011 (audit append-only),
        # NFR-012 (no-emoji). Any violation fails the build.
        run: pdm run pytest tests/architecture -v --no-header

  stack:
    name: stack (integration + e2e)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install pdm
        run: pipx install pdm

      - name: Install dependencies
        run: pdm install

      - name: Bring up local stack
        run: make up

      - name: Show stack status
        run: make ps

      - name: Run integration + e2e tests
        run: make test-integration

      - name: Show container logs on failure
        if: failure()
        run: docker compose -f infra/docker-compose.yml logs --no-color

      - name: Tear down stack
        if: always()
        run: make down
