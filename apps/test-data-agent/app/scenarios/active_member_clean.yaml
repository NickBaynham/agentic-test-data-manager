# Scenario: active_member_clean
#
# Headline happy-path scenario. Active member with a clean paid claim.
# Validators ensure relational consistency. No denial drivers.
scenario_id: active_member_clean
description: Active member with valid coverage and a paid claim.
tags:
  - happy-path
default_constraints:
  member_status: active
  provider_network: in_network
  eligibility_status: active
  eligibility_window: current
  claim_status: paid
generators:
  - generate_plan
  - generate_provider
  - generate_member
  - generate_eligibility
  - generate_claim
validators:
  - relational.eligibility_status_matches_member
  - relational.claim_references_existing_member
  - temporal.eligibility_window_contains_claim
linked_requirement_ids:
  - FR-001
  - FR-005
  - FR-010
